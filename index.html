<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital & Pedidos</title>
    <style>
        :root {
            --primary: #25D366; /* Verde WhatsApp */
            --dark: #128C7E;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #333;
        }
        header {
            background-color: var(--dark);
            color: white;
            text-align: center;
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 0 15px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        /* Estilos del Menú */
        .menu-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .producto-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .producto-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .producto-info p { margin: 0; color: #666; font-size: 0.9rem; }
        .btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-add:hover { background-color: var(--dark); }
        
        /* Estilos del Carrito */
        .carrito-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            height: fit-content;
        }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dotted #ccc;
        }
        .total-box {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
            margin: 20px 0;
        }
        .btn-whatsapp {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-whatsapp:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<header>
    🏪 Nuestro Menú Digital
</header>

<div class="container">
    <!-- SECCIÓN DE PRODUCTOS (MENÚ) -->
    <section class="menu-section">
        <h2>Productos Disponibles</h2>
        
        <!-- Producto 1 -->
        <div class="producto-card">
            <div class="producto-info">
                <h3>Hamburguesa Clásica</h3>
                <p>Carne de res, queso, lechuga y tomate.</p>
                <strong>$85.00</strong>
            </div>
            <button class="btn-add" onclick="agregarAlCarrito('Hamburguesa Clásica', 85)">+ Agregar</button>
        </div>

        <!-- Producto 2 -->
        <div class="producto-card">
            <div class="producto-info">
                <h3>Papas Fritas</h3>
                <p>Porción grande con aderezos.</p>
                <strong>$45.00</strong>
            </div>
            <button class="btn-add" onclick="agregarAlCarrito('Papas Fritas', 45)">+ Agregar</button>
        </div>

        <!-- Producto 3 -->
        <div class="producto-card">
            <div class="producto-info">
                <h3>Refresco 600ml</h3>
                <p>Variedad de sabores sabor cola o sabores.</p>
                <strong>$25.00</strong>
            </div>
            <button class="btn-add" onclick="agregarAlCarrito('Refresco 600ml', 25)">+ Agregar</button>
        </div>
    </section>

    <!-- SECCIÓN DEL CARRITO -->
    <aside class="carrito-section">
        <h2>Tu Pedido</h2>
        <div id="carrito-items">
            <p style="color: #888;">El carrito está vacío.</p>
        </div>
        
        <div class="total-box">
            Total: $<span id="carrito-total">0.00</span>
        </div>

        <button id="btn-enviar" class="btn-whatsapp" onclick="enviarPedido()" disabled>
            Enviar Pedido por WhatsApp
        </button>
    </aside>
</div>

<script>
    // Estado del carrito
    let carrito = [];

    function agregarAlCarrito(nombre, precio) {
        // Verificar si el producto ya está en el carrito
        const itemExiste = carrito.find(item => item.nombre === nombre);
        
        if (itemExiste) {
            itemExiste.cantidad += 1;
        } else {
            carrito.push({ nombre, precio, cantidad: 1 });
        }
        
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        const contenedorItems = document.getElementById('carrito-items');
        const contenedorTotal = document.getElementById('carrito-total');
        const btnEnviar = document.getElementById('btn-enviar');
        
        if (carrito.length === 0) {
            contenedorItems.innerHTML = '<p style="color: #888;">El carrito está vacío.</p>';
            contenedorTotal.innerText = '0.00';
            btnEnviar.disabled = true;
            return;
        }

        btnEnviar.disabled = false;
        contenedorItems.innerHTML = '';
        let total = 0;

        carrito.forEach(item => {
            const subtotal = item.precio * item.cantidad;
            total += subtotal;

            contenedorItems.innerHTML += `
                <div class="carrito-item">
                    <span>${item.cantidad}x ${item.nombre}</span>
                    <span>$${subtotal.toFixed(2)}</span>
                </div>
            `;
        });

        contenedorTotal.innerText = total.toFixed(2);
    }

    function enviarPedido() {
        const numeroTelefono = "525617254081"; // Código de México (52) + tu número
        let textoPedido = "¡Hola! Me gustaría realizar el siguiente pedido desde la página web:%0A%0A";
        
        let total = 0;
        carrito.forEach(item => {
            const subtotal = item.precio * item.cantidad;
            total += subtotal;
            textoPedido += `• *${item.cantidad}x* ${item.nombre} - $${subtotal.toFixed(2)}%0A`;
        });

        textoPedido += `%0A*Total a Pagar:* $${total.toFixed(2)}%0A%0A`;
        textoPedido += "Por favor, confírmame los detalles para el pago y envío. 🙌";

        // Construir URL final de WhatsApp sin usar elementos de edición de página
        const urlFinal = `https://wa.me/${numeroTelefono}?text=${textoPedido}`;
        
        // Redirigir al usuario de forma limpia
        window.open(urlFinal, '_blank');
    }
</script>

</body>
</html>
